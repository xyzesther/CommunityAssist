name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  api:
    name: API checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm ci
      - run: npm test

  client:
    name: Client tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: CI=true npm test
        env:
          REACT_APP_API_URL: /api
          REACT_APP_AUTH0_DOMAIN: example
          REACT_APP_AUTH0_CLIENT_ID: example
          REACT_APP_AUTH0_AUDIENCE: example

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f api/Dockerfile .

      - name: Build web image
        run: |
          docker build \
            -f client/Dockerfile \
            --build-arg REACT_APP_API_URL=/api \
            --build-arg REACT_APP_AUTH0_DOMAIN=example \
            --build-arg REACT_APP_AUTH0_CLIENT_ID=example \
            --build-arg REACT_APP_AUTH0_AUDIENCE=example \
            .
