name: Deploy (EC2 + Docker Compose)

on:
  workflow_dispatch:
  push:
    branches: ["master"]

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_PATH="${DEPLOY_PATH:-${{ secrets.EC2_DEPLOY_PATH }}}"
            if [ -z "${DEPLOY_PATH:-}" ]; then
              DEPLOY_PATH="/opt/communityassist"
            fi

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              mkdir -p "$DEPLOY_PATH"
              git clone "https://github.com/${{ github.repository }}" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            git fetch --all
            git reset --hard "origin/main"

            # Write runtime env vars from GitHub Secrets (multi-line)
            printf '%s' "${{ secrets.EC2_ENV_FILE }}" > .env

            docker compose -f infra/docker-compose.prod.yml --env-file .env up -d --build
            docker image prune -f
